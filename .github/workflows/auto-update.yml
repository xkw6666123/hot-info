name: Auto Update Hot News

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 */3 * * *'   # 每3小时（UTC时间，错开整点）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-bloggers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 避免无限循环：schedule触发不检查；push触发时跳过机器人自己的commit
    if: ${{ github.event_name == 'schedule' || !contains(github.event.head_commit.message, 'auto: merge') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run remote scrapers (TikHub + B站 bloggers)
        run: python generate_hot.py --remote

      - name: Generate data.js
        run: python gen_js_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js index.html
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            TS=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
            git commit -m "auto: merge bloggers ${TS}"
            git push
          fi
