name: Auto Update Hot News

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 */3 * * *'   # 每3小时（UTC时间，错开整点）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-bloggers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 非push事件始终执行；push事件跳过机器人自己的commit避免无限循环
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'auto: merge') }}"
    env:
      MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip dependencies
        run: |
          echo "=== pip version ==="
          pip --version
          echo "=== Installing core packages ==="
          pip install playwright opencc-python-reimplemented requests httpx pandas beautifulsoup4 lxml yt-dlp 2>&1
          echo "=== pip install done, exit: $? ==="

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium 2>&1 || echo "Playwright chromium install failed (non-fatal)"
          python -m playwright install-deps chromium 2>&1 || echo "Playwright deps install failed (non-fatal)"

      - name: Run scrapers (全平台抓取)
        id: scrape
        run: |
          echo "=== ENV ==="
          python --version
          pwd
          python generate_hot.py --local
          echo "EXIT_CODE=$?"
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}

      - name: 数据合并保护 (迁移ASR文案+保留博主/灵感)
        run: |
          echo "=== 合并保护：迁移旧ASR文案，确保不丢失博主数据和灵感库 ==="
          python merge_data.py 2>&1 || echo "merge_data skipped"

      - name: 嵌入数据到HTML
        run: |
          echo "=== data.json size: $(wc -c < data.json) bytes ==="
          python gen_js_data.py

      - name: 生成视频内容简介
        run: python gen_content_intro.py || echo "gen_content_intro skipped"

      - name: 数据完整性检查
        run: |
          echo "=== 数据完整性检查 ==="
          python -c "
          import json
          d = json.load(open('data.json','r',encoding='utf-8'))
          bloggers = {}
          for a in d.get('articles',[]):
              if a.get('source') != 'blogger': continue
              name = a.get('blogger_name','')
              if name not in bloggers: bloggers[name] = []
              bloggers[name].append(a)
          print('博主视频统计:')
          issues = []
          for name, videos in bloggers.items():
              print(f'  {name}: {len(videos)}条')
              if len(videos) != 3: issues.append(f'{name}: {len(videos)}条')
              for v in videos:
                  ci = v.get('content_intro','')
                  if len(ci) < 200: issues.append(f'{name} {v.get(\"date\",\"\")}: 文案过短({len(ci)}字)')
          if issues:
              for i in issues: print(f'  ⚠️ {i}')
          else:
              print('✅ 数据完整性检查通过')
          "

      - name: 自动学习文案
        run: python auto_learn.py || echo "Auto learn skipped"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html blogger_content_learn.json asr_content.json
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            TS=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
            git commit -m "auto: merge ${TS}"
            git push origin HEAD:main
          fi

      - name: 飞书通知
        run: python feishu_notify.py || echo "飞书通知 skipped"
