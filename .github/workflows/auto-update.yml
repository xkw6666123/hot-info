name: Auto Update Hot News

on:
  # schedule:  # 已迁移到本地 Windows 定时任务（解决海外IP被封问题）
  #   - cron: '0 * * * *'
  workflow_dispatch:        # 手动触发（备用）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser pytz pyyaml

      - name: Generate fresh data
        run: python generate_hot.py

      - name: Generate data.js
        run: python gen_js_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "auto: update $(TZ='Asia/Shanghai' date +'%m-%d %H:%M')"
            git push
          fi
