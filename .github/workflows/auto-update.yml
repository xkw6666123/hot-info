name: Auto Update Hot News

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 */3 * * *'   # 每3小时（UTC时间，错开整点）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-bloggers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 非push事件始终执行；push事件跳过机器人自己的commit避免无限循环
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'auto: merge') }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scrapers (全平台抓取)
        id: scrape
        run: |
          echo "=== ENV ==="
          python --version
          which python
          pwd
          ls -la data.json 2>/dev/null || echo "data.json not found"
          echo ""
          python generate_hot.py --local
          EXIT=$?
          echo "EXIT_CODE=$EXIT"
          ls -la data.json 2>/dev/null || echo "data.json missing after script"
          exit $EXIT
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}

      - name: Generate data.js
        run: |
          echo "=== data.json size: $(wc -c < data.json) bytes ==="
          head -c 500 data.json
          echo ""
          python gen_js_data.py
          echo "=== data.js generated ==="

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js index.html
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            TS=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
            git commit -m "auto: merge ${TS}"
            git push origin HEAD:main
          fi
