name: Auto Update Hot News

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 */3 * * *'   # 每3小时（UTC时间，错开整点）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-bloggers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 非push事件始终执行；push事件跳过机器人自己的commit避免无限循环
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'auto: merge') }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-clean-${{ hashFiles('requirements.txt') }}

      - name: Install pip dependencies
        run: |
          echo "=== pip version ==="
          pip --version
          echo "=== Installing pip packages ==="
          pip install --no-cache-dir -r requirements.txt 2>&1
          echo "=== pip install exit code: $? ==="

      - name: Install Playwright
        run: |
          echo "=== Installing Playwright Chromium ==="
          playwright install chromium 2>&1 || echo "Playwright chromium install failed (non-fatal)"
          echo "=== Installing Playwright system deps ==="
          playwright install-deps chromium 2>&1 || echo "Playwright deps install failed (non-fatal)"

      - name: Install Whisper (optional, for ASR)
        run: |
          pip install openai-whisper || echo "Whisper install failed, ASR steps will be skipped"

      - name: Run scrapers (全平台抓取)
        id: scrape
        run: |
          echo "=== ENV ==="
          python --version
          which python
          pwd
          ls -la data.json 2>/dev/null || echo "data.json not found"
          echo ""
          python generate_hot.py --local
          EXIT=$?
          echo "EXIT_CODE=$EXIT"
          ls -la data.json 2>/dev/null || echo "data.json missing after script"
          exit $EXIT
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}

      - name: 嵌入数据到HTML
        run: |
          echo "=== data.json size: $(wc -c < data.json) bytes ==="
          python gen_js_data.py
          echo "=== 数据已嵌入 index.html ==="

      - name: 生成视频内容简介
        run: |
          echo "=== 生成 content_intro ==="
          python gen_content_intro.py || echo "gen_content_intro skipped"

      - name: B站视频 ASR (Whisper base)
        run: |
          echo "=== B站视频文案提取（Whisper base）==="
          python -c "
          import json, sys, os, subprocess, whisper
          from opencc import OpenCC
          cc = OpenCC('t2s')
          
          print('Loading Whisper base model...')
          model = whisper.load_model('base')
          
          with open('data.json','r',encoding='utf-8-sig') as f:
              d = json.load(f)
          
          updated = 0
          for a in d.get('articles',[]):
              if a.get('source') != 'blogger' or 'bilibili.com' not in (a.get('url') or ''):
                  continue
              ci = a.get('content_intro','')
              if len(ci) > 200:
                  continue
              
              print(f'  B站 {a[\"blogger_name\"]}: 提取中...')
              # 使用asr_extract.py的B站提取函数
              try:
                  from asr_extract import get_bilibili_content
                  text = get_bilibili_content(a['url'])
                  if text and len(text) > 50:
                      a['content_intro'] = cc.convert(text)
                      updated += 1
                      print(f'    提取成功: {len(text)}字')
              except Exception as e:
                  print(f'    提取失败: {e}')
          
          if updated:
              with open('data.json','w',encoding='utf-8') as f:
                  json.dump(d, f, ensure_ascii=False, indent=2)
              import subprocess
              subprocess.run(['python','gen_js_data.py'])
              print(f'B站 ASR: {updated}条更新')
          else:
              print('B站视频文案已完整，无需更新')
          " || echo "B站 ASR skipped"

      - name: 抖音视频 ASR (Whisper base)
        run: |
          echo "=== 抖音视频文案提取（Whisper base）==="
          python -c "
          import json, sys, os, subprocess, whisper
          from opencc import OpenCC
          cc = OpenCC('t2s')
          
          print('Loading Whisper base model...')
          model = whisper.load_model('base')
          
          with open('data.json','r',encoding='utf-8-sig') as f:
              d = json.load(f)
          
          updated = 0
          for a in d.get('articles',[]):
              if a.get('source') != 'blogger' or 'douyin.com' not in (a.get('url') or ''):
                  continue
              ci = a.get('content_intro','')
              if len(ci) > 200:
                  continue
              
              print(f'  抖音 {a[\"blogger_name\"]}: 提取中...')
              # 使用asr_extract.py的抖音提取函数
              try:
                  from asr_extract import get_douyin_content
                  text = get_douyin_content(a['url'])
                  if text and len(text) > 50:
                      a['content_intro'] = cc.convert(text)
                      updated += 1
                      print(f'    提取成功: {len(text)}字')
              except Exception as e:
                  print(f'    提取失败: {e}')
          
          if updated:
              with open('data.json','w',encoding='utf-8') as f:
                  json.dump(d, f, ensure_ascii=False, indent=2)
              import subprocess
              subprocess.run(['python','gen_js_data.py'])
              print(f'抖音 ASR: {updated}条更新')
          else:
              print('抖音视频文案已完整或ASR不可用，跳过')
          " || echo "抖音 ASR skipped"

      - name: 数据完整性检查
        run: |
          echo "=== 数据完整性检查 ==="
          python -c "
          import json
          
          with open('data.json','r',encoding='utf-8') as f:
              d = json.load(f)
          
          # 检查博主视频
          bloggers = {}
          for a in d.get('articles',[]):
              if a.get('source') != 'blogger':
                  continue
              name = a.get('blogger_name','')
              if name not in bloggers:
                  bloggers[name] = []
              bloggers[name].append(a)
          
          print('博主视频统计:')
          issues = []
          for name, videos in bloggers.items():
              print(f'  {name}: {len(videos)}条')
              if len(videos) != 3:
                  issues.append(f'{name}: {len(videos)}条（应为3条）')
              for v in videos:
                  ci = v.get('content_intro','')
                  if len(ci) < 200:
                      issues.append(f'{name} {v.get(\"date\",\"\")}: 文案过短({len(ci)}字)')
          
          if issues:
              print('\\n发现问题:')
              for i in issues:
                  print(f'  ⚠️ {i}')
              print('\\n请检查数据完整性')
          else:
              print('\\n✅ 数据完整性检查通过')
          "

      - name: 自动学习文案
        run: |
          echo "=== 自动学习文案 ==="
          python auto_learn.py || echo "Auto learn skipped"

      - name: 生成灵感库
        run: |
          echo "=== 生成灵感库 ==="
          python learn_and_generate.py || echo "Inspiration generation skipped"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html blogger_content_learn.json
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            TS=$(TZ='Asia/Shanghai' date +'%m-%d %H:%M')
            git commit -m "auto: merge ${TS}"
            git push origin HEAD:main
          fi

      - name: 飞书通知
        run: python feishu_notify.py || echo "飞书通知 skipped"
